name: Deploy Hai-Si China Mirror

on:
  push:
    branches: [main, master]
    paths:
      - 'hai-si-site/**'
      - '.github/workflows/hai-si-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: hai-si-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: hai-si-site
      - id: deployment
        uses: actions/deploy-pages@v4
