<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刺桐港寻宝 · 扫码闯关</title>
    <meta name="format-detection" content="telephone=no">
    <meta property="og:title" content="刺桐港寻宝 · 扫码闯关">
    <meta property="og:description" content="家长扫码即可开始亲子研学闯关。">
    <meta property="og:url" content="https://valruna-app.vercel.app/hai-si">
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            min-height: 100dvh;
            font-family: "Noto Serif SC", "Songti SC", serif;
            background: linear-gradient(165deg, #1e3348 0%, #2f4a66 45%, #6ba3a8 100%);
            color: #f6f4ef;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }
        .card {
            max-width: 22rem;
            width: 100%;
            text-align: center;
            background: rgba(246, 244, 239, 0.92);
            border-radius: 1.25rem;
            padding: 2rem 1.5rem;
            color: #3d4a42;
            box-shadow: 0 20px 50px rgba(20, 38, 52, 0.25);
        }
        h1 {
            font-family: "ZCOOL XiaoWei", "KaiTi", serif;
            font-size: 1.5rem;
            letter-spacing: 0.2em;
            color: #2f4a66;
            margin-bottom: 0.35rem;
        }
        .sub {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            color: #6ba3a8;
            margin-bottom: 1.5rem;
        }
        #qr-img {
            width: 16rem;
            height: 16rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(47, 74, 102, 0.15);
            background: #fff;
            padding: 0.5rem;
        }
        .url {
            margin-top: 1rem;
            font-size: 0.72rem;
            word-break: break-all;
            color: #6ba3a8;
            line-height: 1.5;
        }
        .tip {
            margin-top: 1.25rem;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            line-height: 1.6;
            color: #3d4a42;
        }
        .print-btn {
            margin-top: 1.25rem;
            padding: 0.65rem 1.25rem;
            border: 1px solid rgba(107, 163, 168, 0.5);
            border-radius: 0.5rem;
            background: transparent;
            color: #2f4a66;
            font-family: inherit;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            cursor: pointer;
        }
        @media print {
            body { background: #fff; padding: 0; }
            .print-btn { display: none; }
            .card { box-shadow: none; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>丝路启航</h1>
        <p class="sub">刺桐港寻宝 · 亲子闯关</p>
        <img id="qr-img" width="256" height="256" alt="扫码打开闯关页面">
        <p class="url" id="entry-url"></p>
        <p class="tip">请家长用手机相机或微信<br>扫描二维码，即可开始闯关</p>
        <button type="button" class="print-btn" onclick="window.print()">打印此页</button>
    </div>
    <script>
        function getEntryUrl() {
            const u = new URL(window.location.href);
            if (u.pathname.includes('qrcode')) {
                u.pathname = u.pathname.replace(/\/?qrcode(\.html)?\/?$/i, '/');
                if (!u.pathname.endsWith('/')) u.pathname += '/';
                if (u.pathname.endsWith('//')) u.pathname = u.pathname.replace(/\/+$/, '/');
                return u.origin + u.pathname;
            }
            return u.origin + '/hai-si';
        }
        const entryUrl = getEntryUrl();
        document.getElementById('entry-url').textContent = entryUrl;
        document.getElementById('qr-img').src =
            'https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=12&data=' +
            encodeURIComponent(entryUrl);
    </script>
</body>
</html>
